<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סימולטור פואסון ו-EV - מנחשים ומנצחים</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --success-light: #ecfdf5;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 2.2rem; }
        .subtitle { color: var(--text-muted); margin: 5px 0 0 0; }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            padding: 20px;
            border: 1px solid var(--border);
        }

        h2 { font-size: 1.4rem; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: #0f172a; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 5px;
            outline: none;
        }

        .slider-val {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            min-width: 45px;
            text-align: left;
        }

        .slider-number {
            width: 72px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
        }

        .slider-percent { font-weight: 700; }

        .summary-textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }

        .radio-group, .points-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .points-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            font-weight: bold;
        }

        .dist-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .dist-label { width: 60px; font-weight: 600; }
        .dist-bar-bg { flex: 1; background-color: var(--border); height: 24px; border-radius: 4px; overflow: hidden; position: relative; }
        .dist-bar-fill { height: 100%; background-color: var(--primary); transition: width 0.3s ease; }
        .dist-bar-fill.team-b { background-color: #f59e0b; }
        .dist-pct { position: absolute; left: 10px; top: 5px; font-size: 0.85rem; font-weight: bold; color: var(--text); font-variant-numeric: tabular-nums; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th { background-color: #f1f5f9; font-weight: 700; color: #334155; }
        
        tr.optimal-row {
            background-color: var(--success-light);
            font-weight: bold;
        }
        
        tr.optimal-row td {
            border-bottom: 2px solid var(--success);
            border-top: 2px solid var(--success);
            color: #065f46;
        }

        .badge {
            background-color: var(--success);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-right: 8px;
            display: inline-block;
        }

        /* Toggle Button Styling Additions */
        .model-toggle {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .model-toggle label {
            flex: 1;
            text-align: center;
            margin: 0;
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }
        .model-toggle input[type="radio"] { display: none; }
        .model-toggle input[type="radio"]:checked + span {
            background: var(--primary);
            color: white;
            display: block;
            border-radius: 6px;
            padding: 8px;
        }
        .model-toggle span {
            display: block;
            padding: 8px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script src="PolymarketImporter.js?v=20260622-2309"></script>
    <script type="text/babel" src="GuessAndWinApp.js?v=20260622-2309"></script>
</body>
</html>
